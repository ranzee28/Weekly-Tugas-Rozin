<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <a href="data_mahasiswa.html">
        <button class="btn-kembali">Kembali</button>
    </a>
    <h2>Input Data Mahasiswa</h1>
    <form action="">
        <table> 
            <tr>
                <td><label for="nama">Nama</label></td>
                <td>:</td>
                <td><input type="text" id="nama" name="nama"></td>
            </tr>
            <tr>
                <td><label for="nim">NIM</label></td>   
                <td>:</td>
                <td><input type="number" id="nim" name="nim"></td>
            </tr>
            <tr>
                <td><label for="password">Password</label></td>
                <td>:</td>
                <td><input type="password" id="password" name="password"></td>
            </tr>
            <tr>
                <td><label for="email">Email</label></td>
                <td>:</td>
                <td><input type="email" id="email" name="email"></td>
            </tr>
            <tr>
                <td><label for="no_hp">No HP</label></td>
                <td>:</td>
                <td><input type="tel" id="no_hp" name="no_hp"></td>
            </tr>
            <tr>
                <td><label for="website">Website</label></td>
                <td>:</td>
                <td><input type="url" id="website" name="website"></td>
            </tr>
            <tr>
                <td><label for="tanggal_lahir">Tanggal Lahir</label></td>
                <td>:</td>
                <td><input type="date" id="tanggal_lahir" name="tanggal_lahir"></td>
            </tr>
            <tr>
                <td><label for="warna_favorit">Warna Favorit</label></td>
                <td>:</td>
                <td><input type="color" id="warna_favorit" name="warna_favorit"></td>
            </tr>
            <tr>
                <td><label for="tingkat_kepuasan">Tingkat Kepuasan</label></td>
                <td>:</td>
                <td><input type="range" id="tingkat_kepuasan" name="tingkat_kepuasan"></td>
            </tr>
            <tr>
                <td><label for="jenis_kelamin">Jenis Kelamin</label></td>
                <td>:</td>
                <td><input type="radio" id="jenis_kelamin" name="jenis_kelamin">Laki-laki</td>
                <td><input type="radio" id="jenis_kelamin" name="jenis_kelamin">Perempuan</td>
            </tr>
            <tr>
                <td><label for="hobi">Hobi</label></td>
                <td>:</td>
                <td><input type="checkbox" id="hobi" name="hobi">Membaca</td>
                <td><input type="checkbox" id="hobi" name="hobi">Berenang</td>
                <td><input type="checkbox" id="hobi" name="hobi">Tidur</td>
            </tr>
            <tr>
                <td><label for="foto">Upload Foto</label></td>
                <td>:</td>
                <td><input type="file" id="foto" name="foto"></td>
            </tr>
            <tr>
                <td><label for="alamat">Alamat</label></td>
                <td>:</td>
                <td><textarea name="alamat" id="alamat" rows="3" cols="20"></textarea></td>
            </tr>
            <tr>
                <td><label for="jurusan">Jurusan</label></td>
                <td>:</td>
                <td><select name="jurusan" id="jurusan">
                    <option value="informatika">Informatika</option>
                    <option value="sistem_informasi">Sistem Informasi</option>
                    <option value="teknik_komputer">Teknik Komputer</option>
                </select></td>
            </tr>
        </table>
        <button class="btn-kirim">Submit</button>
    </form>
</body>

</html>
